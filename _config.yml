title: L2MD, Fall 2026
description: "Learning to Match Distributions: Optimal Transport, Flow Matching & Applications — NYU CSCI-GA 3033-148, Fall 2026"
theme: just-the-docs

url: https://romain-lopez.github.io
baseurl: /learning-to-match-distributions

# Default every page to the themed layout unless it sets its own (e.g. Home uses `home`)
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Keep planning notes and design docs out of the published site
exclude:
  - dump.md
  - docs/
  - Gemfile
  - Gemfile.lock
